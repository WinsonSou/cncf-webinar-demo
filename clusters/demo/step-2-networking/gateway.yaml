apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: webinar-gateway
  namespace: webinar-demo
spec:
  gatewayClassName: traefik
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - name: webinar-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
